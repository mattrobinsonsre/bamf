name: CI

on:
  push:
    branches: [main]
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io/mattrobinsonsre

# All lint/test jobs use the containerized scripts from scripts/*.sh.
# The only local requirement is Docker (for running containers).
# No Go, Node, Python, or Helm installed on the runner.

jobs:
  # ── Prepare ──────────────────────────────────────────────
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
    outputs:
      sha_short: ${{ steps.meta.outputs.sha_short }}
      images_exist: ${{ steps.check.outputs.images_exist }}
      is_tag: ${{ steps.meta.outputs.is_tag }}
      is_pr: ${{ steps.meta.outputs.is_pr }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Compute metadata
        id: meta
        run: |
          sha_short="${GITHUB_SHA::7}"
          echo "sha_short=$sha_short" >> "$GITHUB_OUTPUT"

          is_tag=false
          is_pr=false
          version=""

          if [[ "$GITHUB_REF" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            is_tag=true
            version="${GITHUB_REF#refs/tags/}"
          fi

          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            is_pr=true
          fi

          echo "is_tag=$is_tag" >> "$GITHUB_OUTPUT"
          echo "is_pr=$is_pr" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: ./.github/actions/ghcr-login
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          username: ${{ github.actor }}

      - name: Check if images exist
        id: check
        run: |
          sha_short="${GITHUB_SHA::7}"
          images_exist=true

          for image in bamf-api bamf-bridge bamf-agent bamf-web bamf-proxy; do
            if ! docker manifest inspect "$REGISTRY/$image:sha-$sha_short" > /dev/null 2>&1; then
              echo "$image:sha-$sha_short not found"
              images_exist=false
              break
            fi
          done

          echo "images_exist=$images_exist" >> "$GITHUB_OUTPUT"
          echo "Images exist: $images_exist"

  # ── Go ──────────────────────────────────────────────────
  go-lint:
    name: Go Lint
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: scripts/lint.sh go

  go-test:
    name: Go Test
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: scripts/test.sh go

  go-build:
    name: Go Build (${{ matrix.platform }})
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Sharded one runner per target platform. The single-job build cross-compiled
    # all 6 platforms serially (~330s, the CI long pole); per-platform shards run
    # in parallel (~55s each). This is a compile check only — the release job
    # builds the shipped binaries (incl. the macOS universal fat binary) itself.
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
          - darwin/amd64
          - darwin/arm64
          - windows/amd64
          - windows/arm64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: scripts/build.sh binaries --platform=${{ matrix.platform }}

  go-security:
    name: Go Security (govulncheck)
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: scripts/security-scan.sh go

  # ── Python ──────────────────────────────────────────────
  python-lint:
    name: Python Lint
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: scripts/lint.sh python

  python-test:
    name: Python Test
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: scripts/test.sh python

  # A broken Alembic migration otherwise merges green (CI never ran it). This
  # runs the full upgrade → downgrade base → upgrade round-trip against Postgres.
  migration-check:
    name: Migration Check
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: scripts/test.sh migrations

  python-security:
    name: Python Security (pip-audit)
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: scripts/security-scan.sh python

  # A source comment or contract-registry row pointing at a moved/renamed file
  # is a silent lie; this fails CI when a docs/ or AGENTS.md path stops resolving.
  docs-xref:
    name: Docs Xref
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: scripts/docs-xref.sh

  # Builds the mkdocs site with --strict: a broken internal link or an
  # orphaned/missing nav page fails CI instead of silently 404-ing on the site.
  docs-build:
    name: Docs Build
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: scripts/docs.sh build

  # Automates the AGENTS.md content-hygiene HARD gate: fails if a tracked file
  # leaks a company name / internal hostname / private tailnet host into this
  # public repo. Was a manual pre-release step.
  content-hygiene:
    name: Content Hygiene
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: scripts/content-hygiene.sh

  # ── Web ─────────────────────────────────────────────────
  web-lint:
    name: Web Lint
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: scripts/lint.sh web

  # AGENTS.md requires `npm run build` for web changes — the Next.js prerender
  # catches breakage eslint + tsc do not. Runs in its own fresh checkout inside
  # a node container (web-lint leaves root-owned node_modules from its Docker run).
  web-build:
    name: Web Build
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container: node:25-alpine
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: npm ci
      - run: npm run build

  web-audit:
    name: npm Audit
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container: node:25-alpine
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install dependencies
        run: npm ci
      - name: Run npm audit
        run: npm audit --audit-level=high

  # ── Helm ────────────────────────────────────────────────
  helm-lint:
    name: Helm Lint
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Helm lint (containerized)
        run: |
          docker run --rm -v "$PWD:/chart" -w /chart \
            alpine/helm:3.17.2 \
            lint helm/bamf --values helm/bamf/values.yaml

      # Every documented topology must render — guards against gating regressions
      # like a Secret that requires input in a topology where its component is off.
      # --entrypoint sh: the alpine/helm image's entrypoint is `helm`, so a bare
      # `... alpine/helm sh -euc` would run `helm sh` ("unknown command").
      - name: Helm template — all 4 topologies must render
        run: |
          docker run --rm --entrypoint sh -v "$PWD:/chart" -w /chart alpine/helm:3.17.2 -euc '
            helm template helm/bamf --set core.enabled=true,outpost.enabled=true,agent.enabled=false >/dev/null
            helm template helm/bamf --set core.enabled=false,outpost.enabled=true,agent.enabled=false >/dev/null
            helm template helm/bamf --set core.enabled=false,outpost.enabled=false,agent.enabled=true,agent.joinToken=dummy,agent.config.name=ci-agent >/dev/null
            helm template helm/bamf --set core.enabled=true,outpost.enabled=true,agent.enabled=true,agent.joinToken=dummy,agent.config.name=ci-agent >/dev/null
            echo "all 4 topologies rendered"
          '

      # Enforce "secrets never land in a ConfigMap" (AGENTS.md) across topologies.
      - name: Helm config contract (no secrets in ConfigMaps)
        run: scripts/helm-config-contract.sh

  # ── Security ────────────────────────────────────────────
  sast:
    name: SAST (Semgrep)
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Run Semgrep
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            semgrep/semgrep:1.117 \
            semgrep scan /src \
              --config "p/python" \
              --config "p/golang" \
              --config "p/owasp-top-ten" \
              --config "p/secrets" \
              --config "/src/pentest/semgrep/.semgrep.yml" \
              --exclude "web/node_modules" \
              --exclude ".next" \
              --exclude "dist" \
              --exclude "alembic/versions" \
              --exclude "reports" \
              --sarif \
              --output "/src/semgrep-results.sarif"
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

  secret-scan:
    name: Secret Scan (gitleaks)
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container: zricethezav/gitleaks:latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Run gitleaks
        run: gitleaks detect --source . --no-git --config .gitleaks.toml

  codeql:
    name: CodeQL (${{ matrix.language }})
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python, go, javascript-typescript]
        include:
          - language: python
            build-mode: none
          - language: go
            build-mode: autobuild
          - language: javascript-typescript
            build-mode: none
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality
          config: |
            paths-ignore:
              - alembic/versions
            query-filters:
              - exclude:
                  id: py/partial-ssrf
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          category: codeql-${{ matrix.language }}

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  # ── Build Images ────────────────────────────────────────
  build-images:
    name: Build ${{ matrix.image }} (${{ matrix.arch }})
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        arch: [amd64, arm64]
        image: [bamf-api, bamf-bridge, bamf-agent, bamf-web, bamf-proxy]
        include:
          - image: bamf-api
            dockerfile: docker/Dockerfile.api
          - image: bamf-bridge
            dockerfile: docker/Dockerfile.bridge
          - image: bamf-agent
            dockerfile: docker/Dockerfile.agent
          - image: bamf-web
            dockerfile: docker/Dockerfile.web
          - image: bamf-proxy
            dockerfile: docker/Dockerfile.proxy
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: ./.github/actions/ghcr-login
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          username: ${{ github.actor }}

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ matrix.image }}:sha-${{ needs.prepare.outputs.sha_short }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arch }}
          provenance: false

  # ── Scan Images (Trivy) ────────────────────────────────
  scan-images:
    name: Scan ${{ matrix.image }}
    needs: [prepare, build-images]
    if: |
      always()
      && needs.build-images.result == 'success'
      && needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        image: [bamf-api, bamf-bridge, bamf-agent, bamf-web, bamf-proxy]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Log in to GHCR
        uses: ./.github/actions/ghcr-login
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          username: ${{ github.actor }}

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: ghcr.io/mattrobinsonsre/${{ matrix.image }}:sha-${{ needs.prepare.outputs.sha_short }}-amd64
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: pentest/trivy/.trivyignore
          exit-code: '1'
          limit-severities-for-sarif: true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: trivy-${{ matrix.image }}

  # ── Create Multi-Arch Manifests ─────────────────────────
  create-manifests:
    name: Manifest ${{ matrix.image }}
    needs:
      - prepare
      - build-images
      - go-lint
      - go-test
      - go-build
      - go-security
      - python-lint
      - python-test
      - migration-check
      - python-security
      - web-lint
      - docs-xref
      - docs-build
      - content-hygiene
      - helm-lint
      - sast
      - secret-scan
      - codeql
      - scan-images
    if: |
      always()
      && needs.build-images.result == 'success'
      && needs.prepare.outputs.is_pr != 'true'
      && !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: [bamf-api, bamf-bridge, bamf-agent, bamf-web, bamf-proxy]
    steps:
      # Checkout is required for the local ./.github/actions/ghcr-login composite
      # action (and its with-retry.sh helper); this job otherwise needs no repo.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Log in to GHCR
        uses: ./.github/actions/ghcr-login
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          username: ${{ github.actor }}

      - name: Create multi-arch manifest
        run: |
          sha_short="${{ needs.prepare.outputs.sha_short }}"
          echo "Creating manifest for ${{ matrix.image }}:sha-$sha_short"
          .github/scripts/with-retry.sh "imagetools create ${{ matrix.image }}" -- \
            docker buildx imagetools create -t "$REGISTRY/${{ matrix.image }}:sha-$sha_short" \
            "$REGISTRY/${{ matrix.image }}:sha-${sha_short}-amd64" \
            "$REGISTRY/${{ matrix.image }}:sha-${sha_short}-arm64"

  # ── Release ─────────────────────────────────────────────
  release:
    name: Release
    needs: [prepare, create-manifests]
    if: |
      always()
      && needs.prepare.outputs.is_tag == 'true'
      && needs.prepare.result == 'success'
      && (needs.create-manifests.result == 'success' || needs.create-manifests.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Log in to GHCR (docker + helm)
        uses: ./.github/actions/ghcr-login
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          username: ${{ github.actor }}
          helm: 'true'

      - name: Retag images with version
        run: |
          sha_short="${{ needs.prepare.outputs.sha_short }}"
          version="${{ needs.prepare.outputs.version }}"

          for image in bamf-api bamf-bridge bamf-agent bamf-web bamf-proxy; do
            echo "Retagging $image:sha-$sha_short -> $version + latest"
            .github/scripts/with-retry.sh "retag $image" -- \
              docker buildx imagetools create \
              -t "$REGISTRY/$image:$version" \
              -t "$REGISTRY/$image:latest" \
              "$REGISTRY/$image:sha-$sha_short"
          done

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5

      - name: Publish Helm chart
        run: |
          version="${{ needs.prepare.outputs.version }}"
          chart_version="${version#v}"

          # helm registry login is handled by the ghcr-login step (helm: true).
          helm package helm/bamf --destination dist/ \
            --version "$chart_version" --app-version "$version"

          .github/scripts/with-retry.sh "helm push" -- \
            helm push "dist/bamf-${chart_version}.tgz" "oci://$REGISTRY"

      - name: Build cross-platform Go binaries
        run: scripts/build.sh binaries

      - name: Generate release notes
        id: notes
        run: |
          version="${{ needs.prepare.outputs.version }}"

          prev_tag=$(git describe --tags --abbrev=0 "${version}^" 2>/dev/null || echo "")

          if [[ -n "$prev_tag" ]]; then
            range="${prev_tag}..${version}"
          else
            range="$version"
          fi

          feats="" fixes="" docs="" refactors="" tests="" chores="" others=""

          while IFS= read -r line; do
            msg=$(echo "$line" | sed -E 's/^[a-z]+(\([^)]*\))?[!]?:[[:space:]]*//')

            case "$line" in
              feat:*|feat\(*)     feats+="- ${msg}"$'\n' ;;
              fix:*|fix\(*)       fixes+="- ${msg}"$'\n' ;;
              docs:*|docs\(*)     docs+="- ${msg}"$'\n' ;;
              refactor:*|refactor\(*) refactors+="- ${msg}"$'\n' ;;
              test:*|test\(*)     tests+="- ${msg}"$'\n' ;;
              chore:*|chore\(*|ci:*|ci\(*) chores+="- ${msg}"$'\n' ;;
              *)                  others+="- ${line}"$'\n' ;;
            esac
          done < <(git log --format='%s' "$range" 2>/dev/null)

          notes=""
          [[ -n "$feats" ]] && notes+="### Features"$'\n\n'"$feats"$'\n'
          [[ -n "$fixes" ]] && notes+="### Bug Fixes"$'\n\n'"$fixes"$'\n'
          [[ -n "$docs" ]] && notes+="### Documentation"$'\n\n'"$docs"$'\n'
          [[ -n "$refactors" ]] && notes+="### Refactoring"$'\n\n'"$refactors"$'\n'
          [[ -n "$tests" ]] && notes+="### Tests"$'\n\n'"$tests"$'\n'
          [[ -n "$chores" ]] && notes+="### Maintenance"$'\n\n'"$chores"$'\n'
          [[ -n "$others" ]] && notes+="### Other Changes"$'\n\n'"$others"$'\n'

          if [[ -n "$prev_tag" ]]; then
            notes+="**Full Changelog**: https://github.com/mattrobinsonsre/bamf/compare/${prev_tag}...${version}"$'\n'
          fi

          echo "$notes" > /tmp/release-notes.md

      # Install syft via the SHA-pinned action instead of `curl … | sh`
      # (removes the piped-shell supply-chain risk and pins the syft version).
      - name: Install syft (SBOM tool)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: v1.46.0

      - name: Generate SBOMs
        run: |
          version="${{ needs.prepare.outputs.version }}"

          for image in bamf-api bamf-bridge bamf-agent bamf-web bamf-proxy; do
            echo "Generating SBOM for $image:$version"
            syft "$REGISTRY/$image:$version" -o spdx-json="dist/sbom-${image}.spdx.json"
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ needs.prepare.outputs.version }}"
          chart_version="${version#v}"

          # Generate checksums for all release artifacts
          (cd dist && sha256sum -- *.tgz *.spdx.json bamf-*-* > checksums.txt)

          gh release create "$version" \
            --title "$version" \
            --notes-file /tmp/release-notes.md \
            dist/bamf-${chart_version}.tgz \
            dist/sbom-bamf-api.spdx.json \
            dist/sbom-bamf-bridge.spdx.json \
            dist/sbom-bamf-agent.spdx.json \
            dist/sbom-bamf-web.spdx.json \
            dist/sbom-bamf-proxy.spdx.json \
            dist/checksums.txt \
            dist/bamf-*-*

  # ── Cleanup Tag on Failure ──────────────────────────────
  cleanup-tag:
    name: Cleanup Tag
    needs: [prepare, build-images, scan-images, create-manifests, release]
    if: |
      always()
      && needs.prepare.outputs.is_tag == 'true'
      && (needs.build-images.result == 'failure' || needs.scan-images.result == 'failure' || needs.create-manifests.result == 'failure' || needs.release.result == 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Delete tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ needs.prepare.outputs.version }}"
          echo "Cleaning up failed release $version"

          gh release delete "$version" --cleanup-tag --yes 2>/dev/null || true
          git push origin ":refs/tags/$version" 2>/dev/null || true

  # ── Gate ────────────────────────────────────────────────
  ci-pass:
    name: CI
    if: always()
    needs:
      - prepare
      - go-lint
      - go-test
      - go-build
      - go-security
      - python-lint
      - python-test
      - migration-check
      - python-security
      - docs-xref
      - docs-build
      - content-hygiene
      - web-lint
      - web-build
      - web-audit
      - helm-lint
      - sast
      - secret-scan
      - codeql
      - dependency-review
      - build-images
      - scan-images
      - create-manifests
      - release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check results
        run: |
          results=(
            "${{ needs.prepare.result }}"
            "${{ needs.go-lint.result }}"
            "${{ needs.go-test.result }}"
            "${{ needs.go-build.result }}"
            "${{ needs.go-security.result }}"
            "${{ needs.python-lint.result }}"
            "${{ needs.python-test.result }}"
            "${{ needs.migration-check.result }}"
            "${{ needs.python-security.result }}"
            "${{ needs.web-lint.result }}"
            "${{ needs.web-build.result }}"
            "${{ needs.web-audit.result }}"
            "${{ needs.docs-xref.result }}"
            "${{ needs.docs-build.result }}"
            "${{ needs.content-hygiene.result }}"
            "${{ needs.helm-lint.result }}"
            "${{ needs.sast.result }}"
            "${{ needs.secret-scan.result }}"
            "${{ needs.codeql.result }}"
            "${{ needs.dependency-review.result }}"
            "${{ needs.build-images.result }}"
            "${{ needs.scan-images.result }}"
            "${{ needs.create-manifests.result }}"
            "${{ needs.release.result }}"
          )

          # A required job passes only if it succeeded, or was legitimately
          # skipped by the images-exist short-circuit on a tag re-push. Anything
          # else — failure, cancelled (incl. timeout), or an unexpected state —
          # must fail the gate. (Previously only "failure" failed, so a cancelled
          # or timed-out required job silently counted as green.)
          for r in "${results[@]}"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "A required job did not pass (result: '$r')"
              exit 1
            fi
          done
          echo "All checks passed"
