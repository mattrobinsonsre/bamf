# Web app proxy routing: docs/guides/web-apps.md
{{- if and .Values.gateway.enabled (eq .Values.gateway.provider "istio") .Values.gateway.tunnelDomain }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "bamf.fullname" . }}-tunnel-proxy
  labels:
    {{- include "bamf.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "bamf.fullname" . }}
      sectionName: https
  hostnames:
    - "*.{{ include "bamf.satellite.tunnelDomain" . }}"
  rules:
    # All web app proxy traffic goes to proxy service (or API if proxy disabled)
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        {{- if .Values.proxy.enabled }}
        - name: {{ include "bamf.fullname" . }}-proxy
          port: 8001
        {{- else }}
        - name: {{ include "bamf.fullname" . }}-api
          port: 8000
        {{- end }}
{{- end }}
