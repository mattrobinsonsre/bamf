# Database credentials: docs/admin/deployment.md
{{- if .Values.core.postgresql.bundled.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bamf.fullname" . }}-postgresql
  labels:
    {{- include "bamf.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
type: Opaque
stringData:
  password: {{ .Values.core.postgresql.bundled.auth.password | quote }}
{{- else if and .Values.core.postgresql.external.enabled (not .Values.core.postgresql.external.existingSecret) (not .Values.core.postgresql.external.externalSecret.enabled) }}
{{- if .Values.core.postgresql.external.password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bamf.fullname" . }}-database-credentials
  labels:
    {{- include "bamf.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.core.postgresql.external.password | quote }}
{{- end }}
{{- end }}
{{- if and .Values.core.postgresql.external.enabled .Values.core.postgresql.external.readReplica.enabled .Values.core.postgresql.external.readReplica.password (not .Values.core.postgresql.external.readReplica.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bamf.fullname" . }}-database-read-credentials
  labels:
    {{- include "bamf.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.core.postgresql.external.readReplica.password | quote }}
{{- end }}
