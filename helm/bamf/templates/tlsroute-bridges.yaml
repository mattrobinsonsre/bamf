# SNI routing: docs/architecture/tunnels.md
{{- if and .Values.outpost.enabled .Values.gateway.enabled (eq .Values.gateway.provider "istio") .Values.gateway.tunnelDomain }}
{{- $fullName := include "bamf.fullname" . -}}
{{- $labels := include "bamf.labels" . -}}
{{- $maxReplicas := int .Values.outpost.bridge.autoscaling.maxReplicas -}}
{{- $tunnelPort := int .Values.outpost.bridge.tunnelPort -}}

# TLSRoutes for SNI-based routing to individual bridge pods
# One route per bridge — bridge is protocol-agnostic (single tunnel port)
# SNI hostname format: {ordinal}.bridge.{tunnelDomain}
# e.g., 0.bridge.tunnel.bamf.example.com
# The "bridge." subdomain separates bridge SNI from web app hostnames
# (which live directly under *.{tunnelDomain}).

{{- $m2mEnabled := and $.Values.gateway.m2m.enabled $.Values.gateway.m2m.tunnelDomain -}}
{{- range $i := until $maxReplicas }}
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: {{ $fullName }}-bridge-{{ $i }}
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: bridge
    bamf.io/bridge-ordinal: "{{ $i }}"
spec:
  parentRefs:
    - name: {{ $fullName }}
      sectionName: tunnel
  hostnames:
    - {{ include "bamf.bridge.sniHostname" (dict "root" $ "ordinal" $i) | quote }}
  rules:
    - backendRefs:
        - name: {{ $fullName }}-bridge-{{ $i }}
          port: {{ $tunnelPort }}
{{- if $m2mEnabled }}
---
# Internal (M2M) TLSRoute to the SAME bridge pod on the internal tunnel domain.
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: {{ $fullName }}-bridge-m2m-{{ $i }}
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: bridge
    bamf.io/bridge-ordinal: "{{ $i }}"
    bamf.io/binding: m2m
spec:
  parentRefs:
    - name: {{ $fullName }}
      sectionName: tunnel-m2m
  hostnames:
    - {{ include "bamf.bridge.m2mSniHostname" (dict "root" $ "ordinal" $i) | quote }}
  rules:
    - backendRefs:
        - name: {{ $fullName }}-bridge-{{ $i }}
          port: {{ $tunnelPort }}
{{- end }}
{{- end }}
{{- end }}
