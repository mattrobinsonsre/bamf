{{- if and .Values.core.enabled .Values.gateway.enabled (eq .Values.gateway.provider "istio") }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "bamf.fullname" . }}-api
  labels:
    {{- include "bamf.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "bamf.fullname" . }}
      sectionName: https
  hostnames:
    - {{ .Values.gateway.hostname | quote }}
  rules:
    {{- if .Values.outpost.enabled }}
    # Kube proxy routes go to proxy service (must come before general /api)
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/kube
      backendRefs:
        - name: {{ include "bamf.fullname" . }}-proxy
          port: 8001
    {{- end }}
    # API routes
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: {{ include "bamf.fullname" . }}-api
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /health
      backendRefs:
        - name: {{ include "bamf.fullname" . }}-api
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /ready
      backendRefs:
        - name: {{ include "bamf.fullname" . }}-api
          port: 8000
    {{- if not .Values.core.web.standalone }}
    # If web not standalone, API serves everything
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "bamf.fullname" . }}-api
          port: 8000
    {{- end }}
{{- if .Values.gateway.m2m.enabled }}
---
# Internal (M2M) HTTPRoute — the same API Service on the internal hostname for
# agents/edges + bridges. Humans/CLI stay on the public route above (#167).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "bamf.fullname" . }}-api-m2m
  labels:
    {{- include "bamf.labels" . | nindent 4 }}
    app.kubernetes.io/component: m2m
spec:
  parentRefs:
    - name: {{ include "bamf.fullname" . }}
      sectionName: https-m2m
  hostnames:
    - {{ required "gateway.m2m.hostname is required when gateway.m2m.enabled" .Values.gateway.m2m.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
        - path:
            type: PathPrefix
            value: /health
        - path:
            type: PathPrefix
            value: /ready
      backendRefs:
        - name: {{ include "bamf.fullname" . }}-api
          port: 8000
{{- end }}
{{- end }}
