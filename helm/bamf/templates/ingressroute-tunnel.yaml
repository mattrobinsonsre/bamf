# Traefik IngressRoute for web app proxy (wildcard tunnel domain)
# Web app proxy docs: docs/guides/web-apps.md
{{- if and .Values.outpost.enabled .Values.gateway.enabled (eq .Values.gateway.provider "traefik") .Values.gateway.tunnelDomain }}
{{- $fullName := include "bamf.fullname" . }}
{{- $entryPoint := .Values.gateway.traefik.entryPoint | default "websecure" }}
{{- $tunnelDomainEscaped := include "bamf.outpost.tunnelDomain" . | replace "." "\\." }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ $fullName }}-tunnel-proxy
  labels:
    {{- include "bamf.labels" . | nindent 4 }}
  {{- with .Values.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  entryPoints:
    - {{ $entryPoint }}
  routes:
    # All web app proxy traffic goes to proxy service (or API if proxy disabled)
    # HostRegexp uses Traefik v3 raw Go regex syntax
    - match: HostRegexp(`^.+\.{{ $tunnelDomainEscaped }}$`)
      kind: Rule
      {{- if .Values.gateway.rateLimit.enabled }}
      middlewares:
        - name: {{ $fullName }}-rate-limit
          namespace: {{ .Release.Namespace }}
      {{- end }}
      services:
        {{- if .Values.outpost.enabled }}
        - name: {{ $fullName }}-proxy
          port: 8001
        {{- else }}
        - name: {{ $fullName }}-api
          port: 8000
        {{- end }}
  tls:
    secretName: {{ .Values.tls.existingSecret | default (printf "%s-tls" $fullName) }}
    options:
      name: {{ $fullName }}-hardened
      namespace: {{ .Release.Namespace }}
{{- end }}
