{{- if .Values.edge.enabled }}
# Bridge scaling: docs/operations/scaling.md
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "bamf.fullname" . }}-bridge
  labels:
    {{- include "bamf.labels" . | nindent 4 }}
    app.kubernetes.io/component: bridge
spec:
  serviceName: {{ include "bamf.fullname" . }}-bridge-headless
  {{- if not .Values.edge.bridge.autoscaling.enabled }}
  replicas: {{ .Values.edge.bridge.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "bamf.bridge.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "bamf.bridge.selectorLabels" . | nindent 8 }}
        {{- with .Values.edge.bridge.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
        {{- with .Values.edge.bridge.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.edge.bridge.terminationGracePeriodSeconds }}
      {{- with .Values.edge.bridge.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.edge.bridge.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      {{- with .Values.edge.bridge.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: bridge
          {{- with .Values.edge.bridge.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: {{ include "bamf.bridge.image" . }}
          imagePullPolicy: {{ .Values.edge.bridge.image.pullPolicy }}
          ports:
            - name: tunnel
              containerPort: {{ .Values.edge.bridge.tunnelPort }}
              protocol: TCP
            - name: health
              containerPort: 8080
              protocol: TCP
          env:
            - name: BAMF_API_URL
              value: http://{{ include "bamf.fullname" . }}-api:8000
            - name: BAMF_TUNNEL_ADDR
              value: ":{{ .Values.edge.bridge.tunnelPort }}"
            - name: BAMF_HEALTH_ADDR
              value: ":8080"
            - name: BAMF_TUNNEL_DOMAIN
              value: {{ include "bamf.edge.tunnelDomain" . | quote }}
            {{- if .Values.edge.name }}
            - name: BAMF_EDGE_NAME
              value: {{ .Values.edge.name | quote }}
            {{- end }}
            # Pod name is predictable: {statefulset}-{ordinal}
            # Bridge extracts ordinal from pod name for bridge ID
            - name: BAMF_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: BAMF_BRIDGE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: BAMF_TLS_MIN_VERSION
              value: {{ .Values.tls.internal.minVersion | default "1.3" | quote }}
            # Shutdown timeout = terminationGracePeriodSeconds - 5s buffer before SIGKILL
            - name: BAMF_SHUTDOWN_TIMEOUT
              value: "{{ sub .Values.edge.bridge.terminationGracePeriodSeconds 5 }}s"
            {{- if .Values.edge.bridge.autoscaling.targetTunnelsPerPod }}
            - name: BAMF_TARGET_TUNNELS_PER_POD
              value: "{{ .Values.edge.bridge.autoscaling.targetTunnelsPerPod }}"
            {{- end }}
            {{- if .Values.edge.bridge.bootstrap.enabled }}
            - name: BAMF_BOOTSTRAP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.edge.bridge.bootstrap.tokenSecret | default (printf "%s-bridge-bootstrap" (include "bamf.fullname" .)) }}
                  key: {{ .Values.edge.bridge.bootstrap.tokenKey | default "token" }}
            - name: BAMF_DATA_DIR
              value: /var/lib/bamf/bridge
            - name: BAMF_TLS_CERT
              value: /var/lib/bamf/bridge/tls.crt
            - name: BAMF_TLS_KEY
              value: /var/lib/bamf/bridge/tls.key
            - name: BAMF_CA_CERT
              value: /var/lib/bamf/bridge/ca.crt
            {{- end }}
            {{- with .Values.edge.bridge.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.edge.bridge.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if .Values.edge.bridge.bootstrap.enabled }}
            - name: data
              mountPath: /var/lib/bamf/bridge
            {{- else }}
            - name: tls
              mountPath: /etc/bamf/tls
              readOnly: true
            {{- end }}
            {{- with .Values.edge.bridge.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: health
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: health
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.edge.bridge.resources | nindent 12 }}
          {{- if gt (int .Values.edge.bridge.preStopSleepSeconds) 0 }}
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - sleep {{ .Values.edge.bridge.preStopSleepSeconds }}
          {{- end }}
      volumes:
        {{- if .Values.edge.bridge.bootstrap.enabled }}
        - name: data
          emptyDir: {}
        {{- else }}
        - name: tls
          secret:
            {{- if .Values.tls.existingSecret }}
            secretName: {{ .Values.tls.existingSecret }}
            {{- else }}
            secretName: {{ include "bamf.fullname" . }}-tls
            {{- end }}
        {{- end }}
        {{- with .Values.edge.bridge.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.edge.bridge.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.edge.bridge.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.edge.bridge.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
