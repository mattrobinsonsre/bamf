# Traefik IngressRouteTCP for per-bridge TLS passthrough (SNI routing)
# SNI routing docs: docs/architecture/tunnels.md
{{- if and .Values.edge.enabled .Values.gateway.enabled (eq .Values.gateway.provider "traefik") .Values.gateway.tunnelDomain }}
{{- $fullName := include "bamf.fullname" . -}}
{{- $labels := include "bamf.labels" . -}}
{{- $maxReplicas := int .Values.edge.bridge.autoscaling.maxReplicas -}}
{{- $tunnelPort := int .Values.edge.bridge.tunnelPort -}}
{{- $entryPoint := .Values.gateway.traefik.entryPoint | default "websecure" -}}

# IngressRouteTCP per bridge pod — TLS passthrough with SNI matching
# Traefik evaluates TCP routers (HostSNI) before HTTP routers on shared
# entrypoints, so bridge SNI hostnames get passthrough while everything
# else gets TLS termination.
# SNI hostname format: {ordinal}.bridge.{tunnelDomain}

{{- $m2mEnabled := and $.Values.gateway.m2m.enabled $.Values.gateway.m2m.tunnelDomain -}}
{{- $m2mEntryPoint := $.Values.gateway.m2m.traefik.entryPoint | default $entryPoint -}}
{{- range $i := until $maxReplicas }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: {{ $fullName }}-bridge-{{ $i }}
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: bridge
    bamf.io/bridge-ordinal: "{{ $i }}"
spec:
  entryPoints:
    - {{ $entryPoint }}
  routes:
    - match: HostSNI(`{{ include "bamf.bridge.sniHostname" (dict "root" $ "ordinal" $i) }}`)
      services:
        - name: {{ $fullName }}-bridge-{{ $i }}
          port: {{ $tunnelPort }}
  tls:
    passthrough: true
{{- if $m2mEnabled }}
---
# Internal (M2M) SNI route to the SAME bridge pod — agents/edges on the internal
# network dial this hostname; the CLI/humans use the public one above. Both are
# TLS-passthrough (the bridge presents its BAMF-CA cert).
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: {{ $fullName }}-bridge-m2m-{{ $i }}
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: bridge
    bamf.io/bridge-ordinal: "{{ $i }}"
    bamf.io/binding: m2m
spec:
  entryPoints:
    - {{ $m2mEntryPoint }}
  routes:
    - match: HostSNI(`{{ include "bamf.bridge.m2mSniHostname" (dict "root" $ "ordinal" $i) }}`)
      services:
        - name: {{ $fullName }}-bridge-{{ $i }}
          port: {{ $tunnelPort }}
  tls:
    passthrough: true
{{- end }}
{{- end }}
{{- end }}
