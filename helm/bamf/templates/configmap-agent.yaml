{{- if .Values.agent.enabled }}
{{- $kubamfEnabled := and (hasKey .Values "kubamf") .Values.kubamf.enabled }}
{{- $agentName := required "agent.config.name is required when agent.enabled=true" .Values.agent.config.name }}
{{- $kubamfResourceName := .Values.kubamf.resourceName | default (printf "%s-kubamf" $agentName) }}
{{- $kubamfTunnelHostname := .Values.kubamf.tunnelHostname | default $kubamfResourceName }}
{{- $kubamfServiceName := printf "%s-kubamf" (include "bamf.fullname" .) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bamf.fullname" . }}-agent-config
  labels:
    {{- include "bamf.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
data:
  agent.yaml: |
    # Platform URL - where to connect to the BAMF API
    # Default: in-cluster API service
    platform_url: {{ .Values.agent.platformUrl | default (printf "http://%s-api:8000" (include "bamf.fullname" .)) | quote }}

    # Agent name (required, must be unique)
    agent_name: {{ $agentName | quote }}

    # Data directory for storing certificates
    data_dir: {{ .Values.agent.dataDir | quote }}

    # Cluster-internal: when true, API sends in-cluster bridge hostnames
    {{- if .Values.agent.clusterInternal }}
    cluster_internal: true
    {{- end }}

    # Labels for RBAC matching
    {{- if .Values.agent.config.labels }}
    labels:
      {{- toYaml .Values.agent.config.labels | nindent 6 }}
    {{- else }}
    labels: {}
    {{- end }}

    # Resources this agent provides access to (list format)
    {{- if or .Values.agent.config.resources $kubamfEnabled }}
    resources:
      {{- range .Values.agent.config.resources }}
      - name: {{ required "resource name is required" .name | quote }}
        type: {{ required "resource type is required" .type | quote }}
        {{- if .hostname }}
        hostname: {{ .hostname | quote }}
        {{- end }}
        {{- if .port }}
        port: {{ .port }}
        {{- end }}
        {{- if .tunnel_hostname }}
        tunnel_hostname: {{ .tunnel_hostname | quote }}
        {{- end }}
        labels:
          {{- if .labels }}
          {{- toYaml .labels | nindent 10 }}
          {{- end }}
          {{- if and $kubamfEnabled (eq .type "kubernetes") }}
          kubamf-tunnel-hostname: {{ $kubamfTunnelHostname | quote }}
          {{- end }}
      {{- end }}
      {{- if $kubamfEnabled }}
      # Auto-registered kubamf (Kubernetes GUI)
      - name: {{ $kubamfResourceName | quote }}
        type: "http"
        hostname: {{ $kubamfServiceName | quote }}
        port: 3001
        tunnel_hostname: {{ $kubamfTunnelHostname | quote }}
        labels:
          app: kubamf
          managed-by: bamf
      {{- end }}
    {{- else }}
    resources: []
    {{- end }}
{{- end }}
