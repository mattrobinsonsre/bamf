{{- if .Values.core.api.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "bamf.serviceAccountName" . }}
  labels:
    {{- include "bamf.labels" . | nindent 4 }}
  {{- with .Values.core.api.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
