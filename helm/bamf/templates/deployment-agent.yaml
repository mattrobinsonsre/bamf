# Agent deployment: docs/guides/agents.md
{{- if .Values.agent.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bamf.fullname" . }}-agent
  labels:
    {{- include "bamf.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  {{- if not .Values.agent.autoscaling.enabled }}
  replicas: {{ .Values.agent.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "bamf.agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-agent.yaml") . | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
      labels:
        {{- include "bamf.agent.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "bamf.fullname" . }}-agent
      terminationGracePeriodSeconds: {{ .Values.agent.terminationGracePeriodSeconds | default 1800 }}
      containers:
        - name: agent
          image: {{ include "bamf.agent.image" . }}
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          args:
            - --config
            - /etc/bamf-agent/agent.yaml
          env:
            - name: BAMF_JOIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.agent.joinTokenSecret | default (printf "%s-agent-join-token" (include "bamf.fullname" .)) }}
                  key: {{ .Values.agent.joinTokenKey | default "token" }}
                  optional: true  # Not needed after initial registration
            - name: BAMF_DATA_DIR
              value: {{ .Values.agent.dataDir | quote }}
            - name: BAMF_CERT_SECRET_NAME
              value: {{ include "bamf.fullname" . }}-agent-certs
            - name: BAMF_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - name: metrics
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
          {{- if .Values.agent.preStopSleepSeconds }}
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "{{ .Values.agent.preStopSleepSeconds }}"]
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/bamf-agent
              readOnly: true
            - name: data
              mountPath: {{ .Values.agent.dataDir }}
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "bamf.fullname" . }}-agent-config
        - name: data
          # Certs are persisted in K8s Secret ({{ include "bamf.fullname" . }}-agent-certs).
          # This volume is only used for local file cache needed by TLS loading.
          emptyDir: {}
      {{- with .Values.agent.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.agent.affinity }}
      affinity:
        {{- toYaml .Values.agent.affinity | nindent 8 }}
      {{- else }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "bamf.agent.selectorLabels" . | nindent 20 }}
                topologyKey: kubernetes.io/hostname
      {{- end }}
      {{- with .Values.agent.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
