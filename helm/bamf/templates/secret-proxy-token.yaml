{{- if .Values.proxy.enabled }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace (printf "%s-proxy-token" (include "bamf.fullname" .)) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bamf.fullname" . }}-proxy-token
  labels:
    {{- include "bamf.labels" . | nindent 4 }}
    app.kubernetes.io/component: proxy
type: Opaque
data:
  {{- if and $existingSecret (not .Values.proxy.internalToken) }}
  {{/* Preserve existing auto-generated token across upgrades */}}
  token: {{ index $existingSecret.data "token" }}
  {{- else if .Values.proxy.internalToken }}
  token: {{ .Values.proxy.internalToken | b64enc }}
  {{- else }}
  {{/* Auto-generate a random token on first install */}}
  token: {{ randAlphaNum 64 | b64enc }}
  {{- end }}
{{- end }}
