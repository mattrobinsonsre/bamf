{{- if .Values.core.enabled }}
# API deployment: docs/admin/deployment.md
{{- include "bamf.validateConfig" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bamf.fullname" . }}-api
  labels:
    {{- include "bamf.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  {{- if not .Values.core.api.autoscaling.enabled }}
  replicas: {{ .Values.core.api.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "bamf.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-api.yaml") . | sha256sum }}
        {{- with .Values.core.api.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "bamf.api.selectorLabels" . | nindent 8 }}
        {{- with .Values.core.api.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "bamf.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.core.api.terminationGracePeriodSeconds }}
      {{- with .Values.core.api.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.core.api.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      {{- with .Values.core.api.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.core.api.extraInitContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          {{- with .Values.core.api.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: {{ include "bamf.api.image" . }}
          imagePullPolicy: {{ .Values.core.api.image.pullPolicy }}
          {{- with .Values.core.api.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "bamf.databaseSecretName" . }}
                  key: {{ include "bamf.databaseSecretKey" . }}
            - name: BAMF_DATABASE_URL
              value: {{ include "bamf.databaseUrl" . | quote }}
            {{- if and .Values.core.postgresql.external.enabled .Values.core.postgresql.external.readReplica.enabled }}
            - name: DATABASE_READ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "bamf.databaseReadSecretName" . }}
                  key: {{ include "bamf.databaseReadSecretKey" . }}
            - name: BAMF_DATABASE_READ_URL
              value: {{ include "bamf.databaseReadUrl" . | quote }}
            {{- end }}
            - name: BAMF_REDIS_URL
              value: {{ include "bamf.redisUrl" . | quote }}
            {{- if .Values.outpost.bridge.bootstrap.enabled }}
            - name: BAMF_BRIDGE_BOOTSTRAP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.outpost.bridge.bootstrap.tokenSecret | default (printf "%s-bridge-bootstrap" (include "bamf.fullname" .)) }}
                  key: {{ .Values.outpost.bridge.bootstrap.tokenKey | default "token" }}
            {{- end }}
            {{- if .Values.outpost.enabled }}
            - name: BAMF_PROXY_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "bamf.fullname" . }}-proxy-token
                  key: token
            {{- end }}
            {{- range $name, $provider := .Values.core.auth.sso.oidc }}
            {{- if $provider.enabled }}
            - name: BAMF_{{ $name | upper }}_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $provider.existingSecret | default (printf "%s-%s" (include "bamf.fullname" $) $name) }}
                  key: {{ $provider.existingSecretKey | default "client_secret" }}
            {{- end }}
            {{- end }}
            {{- with .Values.core.api.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.core.api.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/bamf
              readOnly: true
            {{- with .Values.core.api.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.core.api.resources | nindent 12 }}
          {{- if gt (int .Values.core.api.preStopSleepSeconds) 0 }}
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - sleep {{ .Values.core.api.preStopSleepSeconds }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "bamf.fullname" . }}-api-config
        {{- with .Values.core.api.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.core.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.core.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.core.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

{{- end }}
