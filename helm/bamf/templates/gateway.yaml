# Gateway architecture: docs/admin/deployment.md
{{- if and .Values.gateway.enabled (eq .Values.gateway.provider "istio") }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "bamf.fullname" . }}
  labels:
    {{- include "bamf.labels" . | nindent 4 }}
  {{- with .Values.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
    # HTTPS listener for all HTTP traffic: API, Web UI, and web app proxy.
    # No hostname restriction — route-level hostname matching handles it.
    # This MUST be a single listener because browsers coalesce HTTP/2
    # connections when the same IP, port, and TLS certificate serve multiple
    # hostnames.  Separate listeners would bind routes to the wrong listener
    # when Chrome reuses a connection.
    - name: https
      port: {{ .Values.gateway.ports.https | default 443 }}
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ .Values.tls.existingSecret | default (printf "%s-tls" (include "bamf.fullname" .)) }}
      allowedRoutes:
        namespaces:
          from: Same

    {{- if .Values.gateway.tunnelDomain }}
    # TLS passthrough for mTLS tunnel connections (SSH, DB, generic TCP)
    # Same port as HTTPS — Gateway uses SNI to distinguish terminate vs passthrough.
    # Bridges live under *.bridge.{tunnelDomain} to avoid collision with web app
    # hostnames under *.{tunnelDomain} (e.g., a resource named "bridge-foo").
    - name: tunnel
      port: {{ .Values.gateway.ports.https | default 443 }}
      protocol: TLS
      hostname: "*.bridge.{{ include "bamf.outpost.tunnelDomain" . }}"
      tls:
        mode: Passthrough
      allowedRoutes:
        namespaces:
          from: Same
        kinds:
          - kind: TLSRoute
    {{- end }}

    {{- if .Values.gateway.m2m.enabled }}
    # ── Internal (M2M) split-horizon listeners (#167) ─────────────────────────
    # Internal HTTPS for agent/edge + bridge API bootstrap. A distinct hostname
    # lets SNI pick the (traceable) internal cert vs the public one.
    - name: https-m2m
      port: {{ .Values.gateway.ports.https | default 443 }}
      protocol: HTTPS
      hostname: {{ required "gateway.m2m.hostname is required when gateway.m2m.enabled" .Values.gateway.m2m.hostname | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ .Values.gateway.m2m.tls.existingSecret | default (printf "%s-m2m-tls" (include "bamf.fullname" .)) }}
      allowedRoutes:
        namespaces:
          from: Same
    {{- if .Values.gateway.m2m.tunnelDomain }}
    # Internal TLS-passthrough for the bridge tunnels on the m2m domain.
    - name: tunnel-m2m
      port: {{ .Values.gateway.ports.https | default 443 }}
      protocol: TLS
      hostname: "*.bridge.{{ include "bamf.outpost.m2mTunnelDomain" . }}"
      tls:
        mode: Passthrough
      allowedRoutes:
        namespaces:
          from: Same
        kinds:
          - kind: TLSRoute
    {{- end }}
    {{- end }}
{{- end }}
