{{- if .Values.core.web.standalone }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bamf.fullname" . }}-web
  labels:
    {{- include "bamf.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.core.web.replicas }}
  selector:
    matchLabels:
      {{- include "bamf.web.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.core.web.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "bamf.web.selectorLabels" . | nindent 8 }}
        {{- with .Values.core.web.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "bamf.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.core.web.terminationGracePeriodSeconds | default 60 }}
      {{- with .Values.core.web.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.core.web.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      {{- with .Values.core.web.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: web
          {{- with .Values.core.web.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: {{ include "bamf.web.image" . }}
          imagePullPolicy: {{ .Values.core.web.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: API_URL
              value: "http://{{ include "bamf.fullname" . }}-api:8000"
            {{- with .Values.core.web.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            {{- with .Values.core.web.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.core.web.startupProbe }}
          startupProbe:
            httpGet:
              path: /
              port: http
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: {{ hasKey .Values.core.web.livenessProbe "initialDelaySeconds" | ternary .Values.core.web.livenessProbe.initialDelaySeconds 10 }}
            periodSeconds: {{ hasKey .Values.core.web.livenessProbe "periodSeconds" | ternary .Values.core.web.livenessProbe.periodSeconds 10 }}
            timeoutSeconds: {{ hasKey .Values.core.web.livenessProbe "timeoutSeconds" | ternary .Values.core.web.livenessProbe.timeoutSeconds 1 }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: {{ hasKey .Values.core.web.readinessProbe "initialDelaySeconds" | ternary .Values.core.web.readinessProbe.initialDelaySeconds 5 }}
            periodSeconds: {{ hasKey .Values.core.web.readinessProbe "periodSeconds" | ternary .Values.core.web.readinessProbe.periodSeconds 5 }}
            timeoutSeconds: {{ hasKey .Values.core.web.readinessProbe "timeoutSeconds" | ternary .Values.core.web.readinessProbe.timeoutSeconds 1 }}
          resources:
            {{- toYaml .Values.core.web.resources | nindent 12 }}
          {{- if gt (int .Values.core.web.preStopSleepSeconds) 0 }}
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - sleep {{ .Values.core.web.preStopSleepSeconds }}
          {{- end }}
      {{- with .Values.core.web.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.core.web.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.core.web.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.core.web.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
