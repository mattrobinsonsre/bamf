# Full reference: docs/reference/helm-values.md
# BAMF Helm Chart Values
# Default configuration for production deployment

# Global settings
global:
  # Override container registry for all images (e.g., ECR pull-through cache).
  # When set, prepended to image repository: "registry/repo:tag".
  # Example: "123456789.dkr.ecr.us-east-1.amazonaws.com"
  imageRegistry: ""
  imagePullSecrets: []

# ── API Server (Python/FastAPI) ───────────────────────────────────────────────
api:
  replicas: 2

  image:
    repository: ghcr.io/mattrobinsonsre/bamf-api
    tag: ""  # Defaults to appVersion
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 1Gi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  pdb:
    enabled: true
    minAvailable: 1

  # Configuration mounted as /etc/bamf/config.yaml
  config:
    log_level: info
    certificates:
      user_ttl_hours: 12
      agent_ttl_hours: 8760
      bridge_ttl_hours: 24
    audit:
      retention_days: 90
    # CORS — only origins listed here can make cross-origin requests.
    # Empty list (default) means CORS middleware is disabled (same-origin only).
    # Set to your BAMF hostname for production.
    cors:
      allow_origins: []
      # allow_origins:
      #   - https://bamf.example.com

  # Pod termination settings for graceful shutdown
  terminationGracePeriodSeconds: 120

  # Spot instance handling
  preStopSleepSeconds: 15

  podAnnotations: {}
  podLabels: {}
  priorityClassName: ""
  topologySpreadConstraints: []
  podSecurityContext: {}
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

  # Extra env vars, volumes, and init containers for the API pod
  extraEnv: []
  extraEnvFrom: []
  extraVolumes: []
  extraVolumeMounts: []
  extraInitContainers: []

  service:
    type: ClusterIP
    annotations: {}

  serviceAccount:
    create: true
    name: ""
    annotations: {}

# ── Bridge Server (Go TCP tunnel gateway) ────────────────────────────────────
bridge:
  replicas: 2

  image:
    repository: ghcr.io/mattrobinsonsre/bamf-bridge
    tag: ""
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: "1"
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 1Gi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70
    # Target tunnel count per pod — primary scaling signal via prometheus-adapter.
    # When set (>0), HPA scales on bamf_bridge_active_tunnels custom metric.
    # Also controls the oversubscription threshold for non-migratable session placement.
    # Requires prometheus-adapter in the cluster to expose custom metrics API.
    targetTunnelsPerPod: 50
    # Oversubscription factor for non-migratable sessions (ssh-audit).
    # Low-ordinal bridges accept up to this × targetTunnelsPerPod tunnels before
    # the selector spills ssh-audit sessions to higher ordinals.
    nonMigratableOversubscribeFactor: 1.5

  pdb:
    enabled: true
    minAvailable: 1

  service:
    type: LoadBalancer
    annotations: {}

  headlessService:
    annotations: {}

  # Single tunnel port — bridge is protocol-agnostic, all tunnels use one mTLS port
  tunnelPort: 8443

  # Extended to 1800s (30 min) for non-migratable session protection.
  # After migratable tunnels are migrated (~seconds), the bridge waits for
  # ssh-audit sessions to finish naturally. 30 min covers most interactive sessions.
  terminationGracePeriodSeconds: 1800

  # Pre-stop sleep to allow load balancer to drain connections.
  # The bridge's own graceful shutdown handles tunnel migration;
  # this sleep only ensures the LB stops sending new connections first.
  preStopSleepSeconds: 15

  # Bootstrap configuration for certificate issuance
  # When enabled, bridges request their certificates from the API on startup
  bootstrap:
    enabled: true  # Set to false if using pre-provisioned TLS secrets
    # Bootstrap token for authenticating with the API
    # Required when enabled=true and tokenSecret is not set
    token: ""
    # Name of the K8s Secret containing the bootstrap token (optional)
    # If not set, the chart creates a secret from bootstrap.token
    tokenSecret: ""
    tokenKey: "token"

  podAnnotations: {}
  podLabels: {}
  priorityClassName: ""
  topologySpreadConstraints: []
  podSecurityContext: {}
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

  # Extra env vars and volumes for the bridge pod
  extraEnv: []
  extraEnvFrom: []
  extraVolumes: []
  extraVolumeMounts: []

# ── Web UI ────────────────────────────────────────────────────────────────────
web:
  # Set to true to deploy web UI as standalone pods
  # When false, web UI is served by the bridge
  standalone: false

  replicas: 2

  image:
    repository: ghcr.io/mattrobinsonsre/bamf-web
    tag: ""
    pullPolicy: IfNotPresent

  podAnnotations: {}
  podLabels: {}
  priorityClassName: ""
  topologySpreadConstraints: []
  podSecurityContext: {}
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  terminationGracePeriodSeconds: 60
  preStopSleepSeconds: 5

  livenessProbe: {}
  readinessProbe: {}

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 128Mi

  extraEnv: []
  extraVolumes: []
  extraVolumeMounts: []

  service:
    type: ClusterIP
    annotations: {}

# ── Agent ─────────────────────────────────────────────────────────────────────
# Deploy agents within this cluster to provide access to cluster resources.
# For external agents (VMs, bare metal), deploy separately with a join token.
agent:
  # Set to true to deploy an agent in this cluster
  enabled: false

  # Number of replicas — HA by default with multi-replica instance routing
  replicas: 2

  image:
    repository: ghcr.io/mattrobinsonsre/bamf-agent
    tag: ""
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  # Agent configuration
  config:
    # Agent name (must be unique across the platform)
    name: ""  # Required when enabled
    # Labels for RBAC matching
    labels: {}
    # Resources this agent provides access to
    # Example:
    #   resources:
    #     - name: k8s-api
    #       type: kubernetes
    #       labels:
    #         env: prod
    #     - name: internal-web
    #       type: http
    #       hostname: internal-app.default.svc
    #       port: 8080
    #       labels:
    #         app: internal
    resources: []

  # Join token for registering with the platform
  # Required when enabled
  joinToken: ""
  # Or reference an existing secret containing the join token
  joinTokenSecret: ""
  joinTokenKey: "token"

  # Platform URL (defaults to in-cluster API service)
  platformUrl: ""

  # Cluster-internal: when true, the API sends in-cluster K8s service hostnames
  # for bridge connections instead of external DNS names. Set to true for agents
  # deployed within the same Kubernetes cluster as the platform.
  clusterInternal: false

  # Kubernetes impersonation — enable when agent provides K8s cluster access
  kubernetes:
    impersonation:
      enabled: false  # Set true when agent provides K8s access

  # Data directory for local certificate cache (emptyDir, certs persisted in K8s Secret)
  dataDir: /var/lib/bamf-agent

  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    # Target tunnel count per pod — primary scaling signal via prometheus-adapter.
    # When set (>0), HPA scales on bamf_agent_active_tunnels custom metric.
    # Requires prometheus-adapter in the cluster to expose custom metrics API.
    targetTunnelsPerPod: 50

  pdb:
    enabled: true
    maxUnavailable: 1

  # Extended to 1800s (30 min) for long SSH sessions and tunnel drain.
  # After the agent is marked as draining, it waits for active tunnels
  # to finish naturally. 30 min covers most interactive sessions.
  terminationGracePeriodSeconds: 1800

  # Pre-stop sleep to allow in-flight heartbeats to complete
  preStopSleepSeconds: 5

  podAnnotations: {}
  podLabels: {}
  priorityClassName: ""
  topologySpreadConstraints: []
  podSecurityContext: {}
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

  # Extra env vars and volumes for the agent pod
  extraEnv: []
  extraEnvFrom: []
  extraVolumes: []
  extraVolumeMounts: []

# ── Proxy Service (standalone HTTP proxy) ─────────────────────────────────────
# Handles web app proxying (*.tunnel.domain) and Kubernetes API proxying
# (/api/v1/kube/*). Communicates with the API exclusively via internal HTTP.
proxy:
  enabled: true
  replicas: 2

  image:
    repository: ghcr.io/mattrobinsonsre/bamf-proxy
    tag: ""  # Defaults to appVersion
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

  pdb:
    enabled: true
    minAvailable: 1

  # Shared secret for proxy→API internal auth.
  # Auto-generated and stored in a K8s Secret if empty.
  internalToken: ""

  logLevel: info
  jsonLogs: "true"
  preStopSleepSeconds: 15
  terminationGracePeriodSeconds: 120

  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraEnv: []

  # For satellite deployments, override the API URL to point at a remote central API.
  # apiUrl: https://bamf.example.com

# ── Satellite ──────────────────────────────────────────────────────────────────
# Every proxy+bridge combination is a satellite. The co-located deployment (with API)
# is just a satellite that shares a cluster with the API.
satellite:
  # Enable satellite components (proxy + bridge).
  # When true, satellite.name is required.
  enabled: true

  # DNS-safe short name for this satellite (e.g., "us-east", "eu", "apac").
  # Used as a hostname prefix: *.{name}.tunnel.{domain}
  # Must match [a-z][a-z0-9-]*, max 63 characters.
  name: "default"

  # For remote satellites (api is not co-located):
  # Join token from `POST /api/v1/satellite-tokens`
  joinToken: ""
  # Central API URL (required when satellite is remote)
  apiUrl: ""

  # GeoDNS — optional convenience layer for shared *.tunnel.{domain} hostname.
  # When enabled, the proxy accepts requests on both *.{sat}.tunnel.{domain}
  # and *.tunnel.{domain}. Does NOT manage DNS records.
  geodns:
    enabled: false

# ── Gateway / Ingress Routing ────────────────────────────────────────────────
# provider: traefik (default) or istio
# traefik: Uses Traefik v3 IngressRoute/IngressRouteTCP CRDs (zero setup on Rancher Desktop)
# istio:   Uses Gateway API (Gateway, HTTPRoute, TLSRoute) with Istio controller
gateway:
  enabled: true
  provider: traefik   # traefik | istio
  className: istio    # Only used when provider=istio
  hostname: ""        # Required: e.g., bamf.example.com
  tunnelDomain: ""    # Required: e.g., tunnel.bamf.example.com
  annotations: {}
  ports:
    https: 443
  traefik:
    entryPoint: websecure  # Traefik entrypoint name for HTTPS

  # HTTP rate limiting — applied at the ingress layer (Traefik Middleware or
  # Istio EnvoyFilter). Protects API, web UI, and web app proxy routes from
  # brute-force and denial-of-service. Does NOT apply to tunnel traffic
  # (IngressRouteTCP with TLS passthrough cannot do HTTP middleware).
  rateLimit:
    enabled: true
    average: 100   # Requests per period per source IP (Traefik) / tokens per fill (Istio)
    burst: 200     # Max burst size
    period: 1s     # Token refill period

# ── Ingress (legacy, disabled by default) ─────────────────────────────────────
# Use gateway.enabled=true (default) instead. This is kept for backwards
# compatibility but will be removed in a future version.
ingress:
  external:
    enabled: false
    className: nginx
    hostname: ""  # Required: e.g., bamf.example.com
    tls: true
    certManager: true
    annotations: {}

# ── PostgreSQL ────────────────────────────────────────────────────────────────
# Production: use external PostgreSQL (RDS, Aurora, Cloud SQL, etc.)
# Bundled mode is for dev/staging only.
postgresql:
  bundled:
    enabled: false
    image:
      repository: public.ecr.aws/docker/library/postgres
      tag: "16-alpine"
      pullPolicy: IfNotPresent
    auth:
      database: bamf
      username: bamf
      password: ""  # Required when bundled
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 512Mi
    persistence:
      size: 20Gi
      storageClass: ""

  external:
    enabled: true
    host: ""  # Required when enabled
    port: 5432
    database: bamf
    username: bamf
    sslmode: require

    # Credential options (choose one):
    # 1. Inline password (creates K8s Secret)
    # password: ""

    # 2. Pre-existing K8s Secret
    existingSecret: ""
    existingSecretKey: password

    # 3. ExternalSecrets operator
    externalSecret:
      enabled: false
      secretStoreRef:
        name: ""
        kind: ClusterSecretStore
      remoteRef:
        key: ""
        property: password

    # Read replica — optional, routes read-only queries to a separate endpoint.
    # When disabled (default), all reads go to the primary. Fields that are not
    # set inherit from the parent external block (username, port, database, sslmode).
    readReplica:
      enabled: false
      host: ""  # Required when enabled (e.g., bamf-db-ro.cluster-xxx.rds.amazonaws.com)
      port: ""  # Inherits from external.port if empty
      database: ""  # Inherits from external.database if empty
      username: ""  # Inherits from external.username if empty
      sslmode: ""  # Inherits from external.sslmode if empty

      # Credential options (choose one — same pattern as primary):
      # password: ""          # Inline (creates K8s Secret)
      existingSecret: ""      # Pre-existing K8s Secret
      existingSecretKey: password

# ── Redis ─────────────────────────────────────────────────────────────────────
# Production: use external Redis (ElastiCache, Memorystore, etc.)
# Bundled mode is for dev/staging only.
redis:
  bundled:
    enabled: false
    image:
      repository: public.ecr.aws/docker/library/redis
      tag: "7-alpine"
      pullPolicy: IfNotPresent
    auth:
      enabled: false
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 128Mi
    persistence:
      size: 8Gi
      storageClass: ""

  external:
    enabled: true
    host: ""  # Required when enabled
    port: 6379
    existingSecret: ""
    existingSecretKey: password

# ── SSO / Authentication ──────────────────────────────────────────────────────
auth:
  # Local authentication
  local:
    enabled: true

  # SSO configuration
  sso:
    defaultProvider: ""

    # OIDC providers — map keyed by provider name.
    # Each key becomes the provider name in BAMF (e.g., "auth0", "okta").
    # Example:
    #   oidc:
    #     auth0:
    #       enabled: true
    #       displayName: "Corporate SSO"
    #       issuerUrl: https://myorg.us.auth0.com/
    #       clientId: YOUR_CLIENT_ID
    #       audience: https://bamf.example.com/api
    #       existingSecret: bamf-auth0
    #     okta:
    #       enabled: true
    #       displayName: "Okta"
    #       issuerUrl: https://myorg.okta.com/oauth2/default  # Must use Custom AS
    #       clientId: YOUR_CLIENT_ID
    #       scopes: [openid, profile, email, groups]
    #       groupsClaim: groups
    #       existingSecret: bamf-okta
    oidc: {}
    #   provider-name:
    #     enabled: false
    #     displayName: ""          # Human-readable label for login UI
    #     issuerUrl: ""            # OIDC issuer URL (must serve .well-known/openid-configuration)
    #     clientId: ""
    #     audience: ""             # API identifier for application-scoped permissions (Auth0)
    #     scopes: []               # Override default [openid, profile, email]
    #     groupsClaim: ""          # Claim name for groups/roles (default: "groups")
    #     rolePrefixes: []         # Prefixes to strip from group names (default: ["bamf:", "bamf-"])
    #     # Client secret from K8s Secret (never in ConfigMap)
    #     existingSecret: ""       # If empty, defaults to {fullname}-{provider-name}
    #     existingSecretKey: client_secret

# ── Bootstrap ─────────────────────────────────────────────────────────────────
# Creates an initial admin user and agent join token on first install.
# Only used for local dev or initial setup; disable for production once
# admin users are created via SSO.
# bootstrap:
#   adminEmail: admin@example.com
#   adminPassword: ""  # Required when enabled
#   joinToken: ""      # Optional: pre-create a join token for agents

# ── Migrations ────────────────────────────────────────────────────────────────
migrations:
  enabled: true
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── TLS ───────────────────────────────────────────────────────────────────────
tls:
  certManager:
    enabled: true
    issuerRef:
      name: letsencrypt-prod
      kind: ClusterIssuer

  existingSecret: ""

  # Ingress TLS hardening (Traefik TLSOption / Istio EnvoyFilter).
  # Defaults to TLS 1.3 — all mainstream browsers have supported it since 2019.
  # Set minVersion to VersionTLS12 only if you must support very old clients.
  ingress:
    minVersion: VersionTLS13
    # TLS 1.2 cipher suites (only used when minVersion is VersionTLS12).
    # TLS 1.3 suites are always secure and not configurable.
    cipherSuites:
      - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
      - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
      - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
      - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
      - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256
      - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256
    curvePreferences:
      - X25519
      - CurveP256
      - CurveP384
    # Istio-specific cipher suite names (Envoy format). Only used when
    # gateway.provider=istio and minVersion is VersionTLS12.
    # istioCipherSuites:
    #   - ECDHE-ECDSA-AES256-GCM-SHA384
    #   - ECDHE-RSA-AES256-GCM-SHA384

  # Internal mTLS hardening (Bridge ↔ Agent ↔ CLI tunnel connections).
  # We control both endpoints, so TLS 1.3 is always safe.
  internal:
    minVersion: "1.3"  # "1.2" or "1.3"

# ── Kubamf (Kubernetes GUI) ───────────────────────────────────────────────────
# Deploys kubamf alongside the agent for browser-based K8s access.
# Only meaningful when agent.enabled=true.
kubamf:
  enabled: false
  bamf:
    enabled: true  # Always BAMF mode when deployed via BAMF chart
    # apiUrl defaults to http://{release-name}-api:8000 in the kubamf chart
    apiUrl: ""
    # Name of the 'kubernetes' type resource in agent config.
    # kubamf routes K8s API calls through the BAMF kube proxy using this name.
    # Must match a resource in agent.config.resources with type: kubernetes.
    kubeResourceName: ""
  image:
    repository: ghcr.io/mattrobinsonsre/kubamf
    tag: latest
  # Resource name for agent registration (defaults to "{agent.config.name}-kubamf")
  resourceName: ""
  # Tunnel hostname for HTTP proxy access (defaults to resourceName)
  tunnelHostname: ""

# ── Monitoring ────────────────────────────────────────────────────────────────
metrics:
  enabled: true
  serviceMonitor:
    enabled: false
    namespace: ""
    labels: {}
